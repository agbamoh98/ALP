server:
  port: 8084
  servlet:
    context-path: /api/quizzes

spring:
  application:
    name: quiz-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/alp_quiz}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:alp-dev-secret-key-minimum-256-bits-long-for-hs256-algorithm-ok}

limits:
  quizzes:
    free: ${FREE_MAX_QUIZZES:3}
    premium: ${PREMIUM_MAX_QUIZZES:50}
  questions-per-quiz:
    free: ${FREE_MAX_QUESTIONS_PER_QUIZ:8}
    premium: ${PREMIUM_MAX_QUESTIONS_PER_QUIZ:15}

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.alp.quiz: DEBUG
