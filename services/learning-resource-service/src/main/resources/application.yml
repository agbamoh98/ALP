server:
  port: 8082
  servlet:
    context-path: /api/resources

spring:
  application:
    name: learning-resource-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/alp_resources}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:12MB}

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.alp.resource: DEBUG
