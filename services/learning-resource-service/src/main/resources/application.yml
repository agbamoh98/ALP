server:
  port: 8082
  servlet:
    context-path: /api/resources

spring:
  application:
    name: learning-resource-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/alp_resources}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:12MB}

jwt:
  secret: ${JWT_SECRET:alp-dev-secret-key-minimum-256-bits-long-for-hs256-algorithm-ok}

upload:
  max-size-bytes:
    free: ${FREE_MAX_UPLOAD_BYTES:10485760}       # 10 MB
    premium: ${PREMIUM_MAX_UPLOAD_BYTES:52428800}  # 50 MB

limits:
  resources:
    free: ${FREE_MAX_RESOURCES:3}
    premium: ${PREMIUM_MAX_RESOURCES:100}

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.alp.resource: DEBUG
    org.springframework.security: WARN
