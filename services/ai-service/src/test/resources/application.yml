spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-testing
ai:
  provider: openai
  prompts-dir: ../../prompts
  openai:
    api-key: test-key
    model: gpt-4o-mini
    max-tokens: 100
    temperature: 0.7
