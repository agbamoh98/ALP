server:
  port: 8083
  servlet:
    context-path: /api/ai

spring:
  application:
    name: ai-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/alp_ai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

ai:
  provider: ${AI_PROVIDER:openai}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    max-tokens: ${OPENAI_MAX_TOKENS:2048}

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.alp.ai: DEBUG
